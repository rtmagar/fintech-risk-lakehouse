services:
  # 1. Our Local AWS S3 (Data Lake Storage)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web UI Port
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"

  
    # AUTOMATION: The MinIO Setup Bot
  minio-setup:
    image: minio/mc
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc alias set myminio http://minio:9000 admin password123;
      /usr/bin/mc mb myminio/raw-transactions --ignore-existing;
      /usr/bin/mc mb myminio/cleansed-transactions --ignore-existing;
      /usr/bin/mc mb myminio/risk-aggregates --ignore-existing;
      exit 0;
      "

  # 2. Our Local Kafka (Message Broker)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp 1
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:9093
    ports:
      - "9092:9092"
      - "9093:9093"

  # 3. Kafka Web UI (To see our data streaming live)
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      - redpanda
  

  # --- AUTOMATED STREAMING PIPELINE ---
  
  # 1. The Data Generator (Infinite Mock Data)
  kafka-producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    environment:
      - KAFKA_BROKER=redpanda:9092
      - EVENTS_PER_SECOND=20 # Sped up slightly for better Grafana charts!
    depends_on:
      - redpanda
      
  # 2. The Bronze Stream (Kafka -> S3)
  bronze-ingestion:
    build:
      context: .
      dockerfile: Dockerfile.spark
    depends_on:
      - minio-setup
      - redpanda

# --- Enterprise Airflow Metadata Database ---
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5433:5432"

  # --- Airflow Database Initialization ---
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    command: version

  # --- Airflow Webserver (UI) ---
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
      - airflow-init
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./:/opt/airflow/project  # <-- NEW: Mounts your Python scripts
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    command: webserver

  # --- Airflow Scheduler (The Brain) ---
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
      - airflow-init
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./:/opt/airflow/project  # <-- NEW: Mounts your Python scripts
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    command: scheduler



  # --- Enterprise Observability: Prometheus (Metrics DB) ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - redpanda

  # --- Enterprise Observability: Grafana (Dashboards) ---
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./grafana_provisioning/dashboards:/var/lib/grafana/dashboards
      - ./grafana_provisioning/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
